<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Telegram OIDC Demo</title>
  <style>
    body { font-family: Inter, Arial, sans-serif; background:#0f1117; color:#f4f4f5; min-height:100vh; display:grid; place-items:center; margin:0; }
    .card { width:min(560px, calc(100vw - 32px)); background:#181b23; border:1px solid #2b3040; border-radius:18px; padding:28px; box-shadow:0 20px 60px rgba(0,0,0,.35); }
    h1 { margin:0 0 10px; font-size:26px; }
    p { color:#a8b0c2; line-height:1.5; }
    a.button { display:inline-flex; align-items:center; justify-content:center; margin-top:14px; padding:12px 18px; border-radius:12px; background:#2aabee; color:white; text-decoration:none; font-weight:700; }
    pre { white-space:pre-wrap; background:#10131a; border:1px solid #2b3040; padding:14px; border-radius:12px; overflow:auto; color:#bfe3ff; }
    .error { color:#ff8fa3; }
    .ok { color:#7ee8a2; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Telegram Login Demo</h1>
    <p>Нажми кнопку. Telegram должен открыть авторизацию, а потом сам вернуть тебя на callback. Никакой код руками вводить не нужно.</p>
    <a class="button" href="/api/auth-start">Log in with Telegram</a>
    <div id="result"></div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const result = document.getElementById('result');

    if (params.get('success') === '1') {
      result.innerHTML = '<p class="ok">Login successful</p><pre>' + JSON.stringify({
        name: params.get('name'),
        username: params.get('username'),
        phone: params.get('phone'),
        tg_id: params.get('tg_id'),
        picture: params.get('picture')
      }, null, 2) + '</pre>';
    }

    if (params.get('error')) {
      result.innerHTML = '<p class="error">Error: ' + params.get('error') + '</p><pre>' + (params.get('details') || '') + '</pre>';
    }
  </script>
</body>
</html>
