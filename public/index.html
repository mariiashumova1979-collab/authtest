<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Freedom24 · Telegram Login Demo</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: #fff;
      color: #07142f;
      min-height: 100vh;
    }

    .topbar {
      height: 44px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      position: relative;
      z-index: 5;
    }

    .top-inner {
      width: min(1120px, calc(100vw - 40px));
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 900;
      letter-spacing: -0.3px;
      color: #111827;
    }

    .brand-shield {
      width: 22px;
      height: 26px;
      background: linear-gradient(180deg, #2bbf62, #168f43);
      border-radius: 4px 4px 10px 10px;
      position: relative;
    }

    .brand-shield:after {
      content: "";
      position: absolute;
      left: 7px;
      top: 6px;
      width: 9px;
      height: 12px;
      background: #0c662d;
      border-radius: 2px 2px 6px 6px;
    }

    .brand span { color: #159947; }

    .nav {
      display: flex;
      align-items: center;
      gap: 18px;
      font-size: 13px;
      color: #566176;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #566176;
      text-decoration: none;
      font-weight: 600;
    }

    .grid-icon {
      width: 16px;
      height: 16px;
      display: grid;
      grid-template-columns: repeat(3, 4px);
      grid-template-rows: repeat(3, 4px);
      gap: 2px;
    }

    .grid-icon i {
      width: 4px;
      height: 4px;
      background: #9aa3b2;
      border-radius: 1px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: #566176;
    }

    .login-btn, .open-btn {
      height: 32px;
      padding: 0 18px;
      border-radius: 4px;
      font-weight: 700;
      cursor: pointer;
    }

    .login-btn {
      background: #fff;
      border: 1px solid #d9dee7;
      color: #172033;
    }

    .open-btn {
      background: #19a957;
      border: 1px solid #19a957;
      color: #fff;
    }

    .hamb {
      font-size: 20px;
      line-height: 1;
      color: #566176;
    }

    .main {
      width: min(1120px, calc(100vw - 40px));
      min-height: calc(100vh - 44px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 430px 1fr;
      gap: 78px;
      align-items: center;
    }

    .left h1 {
      margin: 0 0 34px;
      font-size: 31px;
      line-height: 1.1;
      font-weight: 900;
      letter-spacing: -0.8px;
      color: #06152e;
    }

    .back {
      display: inline-block;
      margin-bottom: 14px;
      font-size: 13px;
      color: #159947;
      font-weight: 700;
      text-decoration: none;
    }

    .tg-status {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      padding: 10px 13px;
      border-radius: 7px;
      background: #eaf7e2;
      color: #2e750f;
      font-size: 12px;
      width: 405px;
    }

    .tg-status b {
      display: block;
      font-size: 12.5px;
      margin-bottom: 2px;
    }

    .tg-status small {
      display: block;
      color: #4b7f31;
      font-size: 12px;
    }

    .check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #55ad29;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      flex-shrink: 0;
    }

    .accounts {
      width: 405px;
      max-height: 480px;
      border: 1px solid #dfe3ea;
      border-radius: 4px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 2px 7px rgba(15, 23, 42, 0.04);
    }

    .group {
      height: 36px;
      padding: 10px 14px;
      background: #f1f2f5;
      font-size: 14px;
      font-weight: 900;
      color: #07142f;
    }

    .account {
      min-height: 38px;
      padding: 9px 14px;
      border-top: 1px solid #e3e7ee;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13.5px;
      cursor: pointer;
      color: #07142f;
    }

    .account:hover { background: #f7fbff; }
    .account.active { background: #f8fbff; }

    .account b { font-weight: 900; }
    .account strong {
      font-weight: 900;
      font-size: 13px;
    }

    .badge {
      margin-left: 8px;
      padding: 3px 8px;
      border-radius: 12px;
      background: #4385f5;
      color: #fff;
      font-size: 11px;
      font-weight: 900;
    }

    .crypto {
      min-height: 36px;
      padding: 9px 14px;
      border-top: 1px solid #e3e7ee;
      color: #788295;
      font-size: 12px;
    }

    .right {
      height: 650px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
    }

    .hero {
      position: relative;
      width: 590px;
      height: 560px;
      transform: translateX(16px);
    }

    .cube {
      position: absolute;
      left: 160px;
      top: 310px;
      width: 330px;
      height: 245px;
      border-radius: 30px;
      background: linear-gradient(140deg, #00e46f 0%, #05c862 48%, #0aa850 100%);
      box-shadow: 0 34px 80px rgba(0, 200, 95, 0.35);
      transform: perspective(650px) rotateX(5deg) rotateY(-8deg);
    }

    .cube:before {
      content: "";
      position: absolute;
      left: 28px;
      top: 22px;
      width: 220px;
      height: 110px;
      border-radius: 22px;
      background: rgba(255,255,255,0.12);
      filter: blur(1px);
    }

    .platform {
      position: absolute;
      left: 115px;
      top: 230px;
      width: 390px;
      height: 150px;
      border-radius: 34px;
      background: linear-gradient(145deg, #314341, #162524);
      box-shadow: 0 24px 58px rgba(0,0,0,0.22);
      transform: perspective(700px) rotateX(58deg) rotateZ(18deg);
      z-index: 2;
    }

    .platform:after {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 26px;
      background: linear-gradient(145deg, rgba(7, 255, 112, 0.38), rgba(9, 26, 24, 0.15));
    }

    .bull {
      position: absolute;
      left: 172px;
      top: 115px;
      width: 335px;
      height: 250px;
      z-index: 5;
      transform: rotate(-6deg);
    }

    .bull-body {
      position: absolute;
      left: 70px;
      top: 78px;
      width: 230px;
      height: 125px;
      border-radius: 62% 48% 45% 55%;
      background: radial-gradient(circle at 30% 28%, #e8ddc3 0%, #c7b083 42%, #927852 100%);
      box-shadow: inset -18px -18px 24px rgba(70, 45, 18, 0.2), 0 18px 40px rgba(0,0,0,0.2);
    }

    .bull-head {
      position: absolute;
      left: 20px;
      top: 115px;
      width: 95px;
      height: 70px;
      border-radius: 55% 45% 50% 55%;
      background: radial-gradient(circle at 35% 25%, #e9dec4, #b2986c 60%, #876d4a);
      transform: rotate(-18deg);
      box-shadow: inset -10px -8px 14px rgba(70, 45, 18, 0.18);
    }

    .bull-nose {
      position: absolute;
      left: 8px;
      top: 40px;
      width: 44px;
      height: 28px;
      border-radius: 50%;
      background: #b8a176;
      transform: rotate(-8deg);
    }

    .horn {
      position: absolute;
      width: 78px;
      height: 24px;
      border-radius: 50%;
      border-top: 10px solid #d9caa8;
      z-index: 7;
    }

    .horn.left {
      left: 10px;
      top: 82px;
      transform: rotate(-128deg);
    }

    .horn.right {
      left: 62px;
      top: 75px;
      transform: rotate(-32deg);
    }

    .leg {
      position: absolute;
      width: 24px;
      height: 70px;
      border-radius: 16px;
      background: linear-gradient(#b69c72, #6d5638);
      top: 178px;
      z-index: 4;
    }
    .l1 { left: 110px; transform: rotate(12deg); }
    .l2 { left: 180px; transform: rotate(-4deg); }
    .l3 { left: 248px; transform: rotate(9deg); }
    .l4 { left: 288px; transform: rotate(-10deg); }

    .tail {
      position: absolute;
      right: 16px;
      top: 70px;
      width: 44px;
      height: 70px;
      border-radius: 50%;
      border-right: 9px solid #9a815a;
      transform: rotate(-25deg);
    }

    .chip {
      position: absolute;
      width: 114px;
      height: 88px;
      border-radius: 19px;
      background: linear-gradient(145deg, #eef3f3, #9ba9a5);
      color: #243033;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      letter-spacing: -0.4px;
      box-shadow: 0 18px 35px rgba(15, 23, 42, 0.18);
      z-index: 6;
      transform: rotate(-5deg);
    }

    .chip.meta {
      left: 80px;
      top: 48px;
      font-size: 24px;
    }

    .chip.amd {
      right: 20px;
      top: 54px;
      font-size: 26px;
      background: linear-gradient(145deg, #a6b4b2, #344442);
    }

    .chip.tesla {
      right: 92px;
      top: 304px;
      width: 128px;
      height: 112px;
      font-size: 24px;
      transform: rotate(2deg);
    }

    .chip.nvda {
      left: 26px;
      bottom: 78px;
      width: 108px;
      height: 96px;
      font-size: 22px;
      transform: rotate(-7deg);
    }

    .chip.adobe {
      right: -18px;
      bottom: 80px;
      width: 110px;
      height: 92px;
      font-size: 22px;
      transform: rotate(5deg);
      background: linear-gradient(145deg, #e6eeee, #9cb1ab);
    }

    .error-card {
      width: min(560px, calc(100vw - 32px));
      margin: 160px auto;
      background:#181b23;
      border:1px solid #2b3040;
      border-radius:18px;
      padding:28px;
      box-shadow:0 20px 60px rgba(0,0,0,.15);
      color:#f4f4f5;
    }

    .error-card h1 { margin:0 0 10px; font-size:26px; }
    .error-card p { color:#ff8fa3; line-height:1.5; }
    .error-card a {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      margin-top:14px;
      padding:12px 18px;
      border-radius:12px;
      background:#2aabee;
      color:white;
      text-decoration:none;
      font-weight:700;
    }

    @media (max-width: 960px) {
      .nav { display: none; }
      .main {
        grid-template-columns: 1fr;
        padding: 40px 0;
        align-items: start;
      }
      .left {
        margin: 0 auto;
        width: min(430px, 100%);
      }
      .right { display: none; }
      .accounts, .tg-status { width: 100%; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const params = new URLSearchParams(location.search);
    const app = document.getElementById('app');

    const name = params.get('name') || 'Мария';
    const username = params.get('username') || 'MariiaShumova';
    const phone = params.get('phone') || '79104133562';

    function accountScreen() {
      app.innerHTML = `
        <header class="topbar">
          <div class="top-inner">
            <div class="brand">
              <div class="brand-shield"></div>
              FREEDOM<span>24</span>
            </div>

            <nav class="nav">
              <a class="nav-link" href="#">
                <span class="grid-icon"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></span>
                Сервисы
              </a>
              <a class="nav-link" href="#">Тарифы</a>
              <a class="nav-link" href="#">О нас</a>
            </nav>

            <div class="top-actions">
              <button class="login-btn">Войти</button>
              <button class="open-btn">Открыть счёт</button>
              <span>Рус</span>
              <span class="hamb">≡</span>
            </div>
          </div>
        </header>

        <main class="main">
          <section class="left">
            <h1>Выберите счёт</h1>
            <a class="back" href="#">← Вернуться назад</a>

            <div class="tg-status">
              <div class="check">✓</div>
              <div>
                <b>Номер подтверждён через Telegram</b>
                <small>${escapeHtml(name)} · @${escapeHtml(username)} · ${escapeHtml(phone)}</small>
              </div>
            </div>

            <div class="accounts">
              <div class="group">Freedom24</div>

              <div class="account active">
                <div><b>CY #1194743</b><span class="badge">Адм</span></div>
                <strong>22 873.68 USD</strong>
              </div>

              <div class="account">
                <b>CY #1492787</b>
                <strong>105.20 EUR</strong>
              </div>

              <div class="account">
                <b>CY #1646971</b>
                <strong>0.00 USD</strong>
              </div>

              <div class="account">
                <b>CY #1834050</b>
                <strong>0.00 EUR</strong>
              </div>

              <div class="account">
                <b>CY #1834075</b>
                <strong>0.00 EUR</strong>
              </div>

              <div class="group">Цифра брокер</div>

              <div class="account">
                <b>RU #033631</b>
                <strong>13 663.94 RUR</strong>
              </div>

              <div class="group">Wallet Solutions</div>

              <div class="account">
                <b>EE #1609128</b>
                <strong>17.14 EUR</strong>
              </div>

              <div class="crypto">Крипто счет</div>

              <div class="group">TFOS</div>

              <div class="account">
                <b>ZA #1742683</b>
                <strong>0.00 USD</strong>
              </div>

              <div class="account">
                <b>ZA #D1742683</b>
                <strong>0.00 USD</strong>
              </div>
            </div>
          </section>

          <section class="right">
            <div class="hero">
              <div class="chip meta">∞ Meta</div>
              <div class="chip amd">AMD</div>
              <div class="chip tesla">TESLA</div>
              <div class="chip nvda">NVIDIA</div>
              <div class="chip adobe">Adobe</div>

              <div class="cube"></div>
              <div class="platform"></div>

              <div class="bull">
                <div class="tail"></div>
                <div class="horn left"></div>
                <div class="horn right"></div>
                <div class="bull-body"></div>
                <div class="bull-head"><div class="bull-nose"></div></div>
                <div class="leg l1"></div>
                <div class="leg l2"></div>
                <div class="leg l3"></div>
                <div class="leg l4"></div>
              </div>
            </div>
          </section>
        </main>
      `;
    }

    function loginScreen() {
      app.innerHTML = `
        <div class="error-card">
          <h1>Telegram Login Demo</h1>
          <p style="color:#a8b0c2">Нажми кнопку. Telegram откроет авторизацию, а потом вернёт тебя на callback. Никакой код руками вводить не нужно.</p>
          <a href="/api/auth-start">Log in with Telegram</a>
        </div>
      `;
    }

    function errorScreen(error, details) {
      app.innerHTML = `
        <div class="error-card">
          <h1>Ошибка входа</h1>
          <p>${escapeHtml(error || 'unknown_error')}</p>
          ${details ? `<pre style="white-space:pre-wrap;background:#10131a;border:1px solid #2b3040;padding:14px;border-radius:12px;color:#bfe3ff;">${escapeHtml(details)}</pre>` : ''}
          <a href="/api/auth-start">Попробовать снова</a>
        </div>
      `;
    }

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    if (params.get('error')) {
      errorScreen(params.get('error'), params.get('details'));
    } else if (params.get('success') === '1') {
      accountScreen();
    } else {
      loginScreen();
    }
  </script>
</body>
</html>
