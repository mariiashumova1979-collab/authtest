<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Войти</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    background: #fff;
    border-radius: 20px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    text-align: center;
  }

  .logo {
    width: 56px;
    height: 56px;
    background: #1a1a18;
    border-radius: 16px;
    margin: 0 auto 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo svg { width: 28px; height: 28px; fill: #fff; }

  h1 {
    font-size: 22px;
    font-weight: 600;
    color: #1a1a18;
    margin-bottom: 8px;
  }

  .subtitle {
    font-size: 14px;
    color: #73726c;
    margin-bottom: 32px;
    line-height: 1.5;
  }

  /* Обёртка для виджета Telegram */
  .tg-widget-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 8px;
  }

  .terms {
    font-size: 12px;
    color: #b4b2a9;
    line-height: 1.6;
    margin-top: 20px;
  }

  .terms a { color: #73726c; text-decoration: underline; }

  /* Success screen */
  .auth-screen, .success-screen { display: none; }
  .auth-screen.active, .success-screen.active { display: block; }

  .avatar {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: #e8e6df;
    margin: 0 auto 16px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: #73726c;
  }

  .avatar img { width: 100%; height: 100%; object-fit: cover; }

  .user-name {
    font-size: 20px;
    font-weight: 600;
    color: #1a1a18;
    margin-bottom: 4px;
  }

  .user-handle {
    font-size: 14px;
    color: #73726c;
    margin-bottom: 12px;
  }

  .user-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: #3b6d11;
    background: #eaf3de;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 28px;
  }

  .user-id {
    font-size: 12px;
    color: #b4b2a9;
    margin-bottom: 20px;
  }

  .logout-btn {
    background: none;
    border: 0.5px solid #d3d1c7;
    border-radius: 10px;
    padding: 10px 24px;
    font-size: 13px;
    color: #73726c;
    cursor: pointer;
    transition: background .15s;
  }

  .logout-btn:hover { background: #f5f4f0; }
</style>
</head>
<body>

<div class="card">

  <!-- Auth screen -->
  <div class="auth-screen active" id="authScreen">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
    </div>
    <h1>Добро пожаловать</h1>
    <p class="subtitle">Войдите в аккаунт чтобы продолжить</p>
    <div class="tg-widget-wrap" id="widgetWrap"></div>
    <p class="terms">
      Нажимая кнопку, вы соглашаетесь с <a href="#">условиями использования</a>
      и <a href="#">политикой конфиденциальности</a>
    </p>
  </div>

  <!-- Success screen -->
  <div class="success-screen" id="successScreen">
    <div class="avatar" id="userAvatar">👤</div>
    <div class="user-name" id="userName">—</div>
    <div class="user-handle" id="userHandle">—</div>
    <div class="user-badge">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
        <path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z"/>
      </svg>
      Авторизован через Telegram
    </div>
    <div class="user-id" id="userId"></div>
    <button class="logout-btn" id="logoutBtn">Выйти</button>
  </div>

</div>

<script>
  const AUTH_URL = 'https://mariiashumova1979-collab.github.io/authtest/';
  const BOT_NAME = 'Auth_test121223_bot';

  // Проверяем URL параметры после redirect от Telegram
  const params = new URLSearchParams(window.location.search);
  const userId = params.get('id');

  if (userId) {
    // Авторизация успешна — показываем профиль
    const firstName = params.get('first_name') || '';
    const lastName = params.get('last_name') || '';
    const username = params.get('username') || '';
    const photoUrl = params.get('photo_url') || '';

    document.getElementById('userName').textContent = firstName + (lastName ? ' ' + lastName : '');
    document.getElementById('userHandle').textContent = username ? '@' + username : '';
    document.getElementById('userId').textContent = 'Telegram ID: ' + userId;

    if (photoUrl) {
      document.getElementById('userAvatar').innerHTML = '<img src="' + decodeURIComponent(photoUrl) + '" alt="">';
    } else {
      document.getElementById('userAvatar').textContent = firstName[0] || '?';
    }

    document.getElementById('authScreen').classList.remove('active');
    document.getElementById('successScreen').classList.add('active');
  }

  // Выход
  document.getElementById('logoutBtn').addEventListener('click', function() {
    window.location.href = AUTH_URL;
  });
</script>

<!-- Telegram Login Widget -->
<script async src="https://telegram.org/js/telegram-widget.js?22"
  data-telegram-login="Auth_test121223_bot"
  data-size="large"
  data-auth-url="https://mariiashumova1979-collab.github.io/authtest/"
  data-request-access="write">
</script>

<script>
  // Перемещаем виджет внутрь нашего UI после загрузки
  const observer = new MutationObserver(function() {
    const iframe = document.querySelector('iframe[src*="telegram"]');
    if (iframe) {
      document.getElementById('widgetWrap').appendChild(iframe);
      observer.disconnect();
    }
  });
  observer.observe(document.body, { childList: true, subtree: true });
</script>

</body>
</html>
